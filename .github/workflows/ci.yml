name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  unit-tests:
    name: Native unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio
      - name: Run host unit tests
        run: pio test -e native -v

  build-examples:
    name: Compile examples (${{ matrix.board }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Primary target, the bench-test board (Adafruit Feather ESP32 V2),
        # and a third architecture to prove portability.
        board: [ blues_swan_r5, adafruit_feather_esp32_v2, esp32dev ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio
      - name: Compile all examples
        run: |
          for ex in examples/*/*.ino; do
            echo "::group::Building $ex for ${{ matrix.board }}"
            pio ci --lib="." --board=${{ matrix.board }} "$ex"
            echo "::endgroup::"
          done
