; PlatformIO project configuration for the VeDirect_Arduino library.
;
; This file exists to run the host-side unit tests (`pio test -e native`) and
; is not required to *consume* the library — downstream projects add it via
; lib_deps (see README.md). The library's own manifest is library.properties.
;
; Examples are compiled in CI with `pio ci` against real boards; see
; .github/workflows/ci.yml.

[platformio]
default_envs = native

; --- Host unit tests (no hardware) ---
[env:native]
platform = native
test_framework = unity
; Compile the library's own src/ into the test program (off by default for
; tests) and put the mock Arduino core on the include path.
test_build_src = true
build_flags =
    -std=gnu++17
    -I test/mock
    -I src
build_src_filter = +<*>

; --- Primary hardware target: Blues Swan (STM32L4R5) ---
; Provided for reference / on-target builds. CI uses `pio ci` for examples.
[env:swan_r5]
platform = ststm32
board = blues_swan_r5
framework = arduino
build_flags = -I src
