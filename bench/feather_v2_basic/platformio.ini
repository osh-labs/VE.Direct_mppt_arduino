; Standalone PlatformIO project for bench-testing the BasicTelemetry example
; on an Adafruit Feather ESP32 V2. Depends on the VeDirect_Arduino library one
; directory up (this repo) via a symlink so edits to ../../src take effect
; immediately without reinstalling.
;
; Usage (from this directory):
;   pio run -t upload -t monitor

[env:feather_v2]
platform  = espressif32
board     = adafruit_feather_esp32_v2
framework = arduino
lib_deps  = symlink://../..
monitor_speed = 115200
